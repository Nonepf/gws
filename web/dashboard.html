<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GWS — 对话</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0d12; --surface: #16161f; --surface2: #1e1e2a;
  --border: #2a2a3a; --text: #e0e0e8; --text2: #8888a0;
  --accent: #6b8aff; --accent2: #4a6adf;
  --green: #4ade80; --orange: #fb923c; --red: #f87171;
  --user-bg: #1a2a1e; --gws-bg: #1a1a2e;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; }

/* Sidebar */
.sidebar {
  width: 300px; min-width: 300px; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-header h1 { font-size: 1.2em; }
.sidebar-header h1 span { color: var(--accent); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

.sidebar-section {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.sidebar-section h3 {
  font-size: 0.7em; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text2); margin-bottom: 10px;
}

/* Emotion */
.emotion-main { text-align: center; margin-bottom: 8px; }
.emotion-label { font-size: 1.4em; font-weight: 700; }
.pad-row { display: flex; align-items: center; margin: 4px 0; font-size: 0.8em; }
.pad-label { width: 28px; color: var(--text2); }
.pad-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; position: relative; margin: 0 8px; }
.pad-fill { position: absolute; height: 100%; border-radius: 3px; transition: width 0.5s, left 0.5s; }
.pad-val { width: 40px; text-align: right; color: var(--text2); font-size: 0.9em; }

/* Boredom */
.boredom-track { width: 100%; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin: 6px 0; }
.boredom-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--orange), var(--red)); transition: width 0.5s; border-radius: 5px; }
.feeling { font-size: 0.8em; color: var(--text2); font-style: italic; }

/* Stats */
.stat { display: flex; justify-content: space-between; font-size: 0.8em; padding: 3px 0; }
.stat-label { color: var(--text2); }
.stat-value { color: var(--text); font-weight: 500; }

/* Subconscious */
.sub-agents { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.sub-chip {
  padding: 3px 8px; background: var(--surface2); border-radius: 10px;
  font-size: 0.75em; color: var(--text2); border: 1px solid var(--border);
}
.sub-chip.active { border-color: var(--accent); color: var(--accent); }
.sub-chip.thinking { border-color: var(--orange); color: var(--orange); animation: pulse 1.5s infinite; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* Memory list */
.memory-list { max-height: 120px; overflow-y: auto; font-size: 0.75em; }
.memory-item {
  padding: 4px 6px; margin: 2px 0; background: var(--surface2);
  border-radius: 4px; border-left: 2px solid var(--accent);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.memory-item .mem-type { color: var(--text2); margin-right: 4px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Main Chat */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
.chat-header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
}
.chat-header .left { display: flex; align-items: center; gap: 8px; }
.chat-title { font-weight: 600; }
.chat-subtitle { font-size: 0.8em; color: var(--text2); }

.chat-area { flex: 1; overflow-y: auto; padding: 20px; }

/* Messages */
.msg { margin: 8px 0; display: flex; flex-direction: column; }
.msg.user { align-items: flex-end; }
.msg.gws { align-items: flex-start; }
.msg-bubble {
  max-width: 75%; padding: 10px 14px; border-radius: 12px;
  font-size: 0.92em; line-height: 1.5; word-break: break-word;
}
.msg.user .msg-bubble { background: var(--user-bg); border: 1px solid #2a3a2e; border-bottom-right-radius: 4px; }
.msg.gws .msg-bubble { background: var(--gws-bg); border: 1px solid #2a2a3e; border-bottom-left-radius: 4px; }
.msg-meta { font-size: 0.7em; color: var(--text2); margin-top: 4px; padding: 0 4px; display: flex; gap: 8px; }

/* Subconscious activity in chat */
.sub-activity {
  max-width: 80%; margin: 8px 0; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; font-size: 0.82em; color: var(--text2);
  border-left: 3px solid var(--accent);
}
.sub-activity .sub-title { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 4px; }
.sub-activity .sub-content { line-height: 1.4; }

/* System message */
.sys-msg { text-align: center; font-size: 0.75em; color: var(--text2); margin: 12px 0; }
.sys-msg span { background: var(--surface); padding: 4px 12px; border-radius: 10px; }

/* Input area */
.input-area {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; background: var(--surface);
}
.input-area input {
  flex: 1; padding: 10px 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 0.9em; outline: none;
  transition: border-color 0.2s;
}
.input-area input:focus { border-color: var(--accent); }
.input-area button {
  padding: 10px 20px; background: var(--accent); border: none;
  border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer;
  transition: background 0.2s;
}
.input-area button:hover { background: var(--accent2); }

/* Typing indicator */
.typing { display: none; padding: 8px 14px; }
.typing.show { display: flex; gap: 4px; align-items: center; }
.typing span { font-size: 0.75em; color: var(--text2); margin-right: 4px; }
.typing .dot { width: 6px; height: 6px; background: var(--text2); border-radius: 50%; animation: bounce 1.4s infinite; }
.typing .dot:nth-child(2) { animation-delay: 0.2s; }
.typing .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

/* Right panel */
.right-panel {
  width: 260px; min-width: 260px; background: var(--surface);
  border-left: 1px solid var(--border); height: 100vh; overflow-y: auto;
  padding: 12px;
}
.right-panel h3 {
  font-size: 0.7em; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text2); margin: 12px 0 8px;
}
.right-panel h3:first-child { margin-top: 0; }

/* Thought stream */
.thought-item {
  padding: 8px 10px; margin: 4px 0; background: var(--surface2);
  border-radius: 8px; font-size: 0.78em; line-height: 1.4;
  border-left: 2px solid var(--border);
}
.thought-item .th-source { font-size: 0.8em; color: var(--accent); margin-bottom: 2px; }
.thought-item .th-time { font-size: 0.75em; color: var(--text2); }

/* Responsive */
@media (max-width: 1100px) { .right-panel { display: none; } }
@media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <span class="status-dot" id="conn-dot"></span>
    <h1>🌳 <span>GWS</span></h1>
  </div>

  <!-- Emotion -->
  <div class="sidebar-section">
    <h3>🎭 情绪状态</h3>
    <div class="emotion-main">
      <div class="emotion-label" id="em-label">中性</div>
    </div>
    <div class="pad-row">
      <span class="pad-label">V</span>
      <div class="pad-bar"><div class="pad-fill" id="bar-v" style="left:50%;width:0"></div></div>
      <span class="pad-val" id="val-v">0.00</span>
    </div>
    <div class="pad-row">
      <span class="pad-label">A</span>
      <div class="pad-bar"><div class="pad-fill" id="bar-a" style="left:50%;width:0"></div></div>
      <span class="pad-val" id="val-a">0.00</span>
    </div>
    <div class="pad-row">
      <span class="pad-label">D</span>
      <div class="pad-bar"><div class="pad-fill" id="bar-d" style="left:50%;width:0"></div></div>
      <span class="pad-val" id="val-d">0.00</span>
    </div>
    <div class="stat" style="margin-top:6px">
      <span class="stat-label">策略</span>
      <span class="stat-value" id="em-strategy">neutral</span>
    </div>
  </div>

  <!-- Autonomy -->
  <div class="sidebar-section">
    <h3>🤖 自主状态</h3>
    <div class="stat"><span class="stat-label">无聊感</span><span class="stat-value" id="au-boredom">0%</span></div>
    <div class="boredom-track"><div class="boredom-fill" id="au-bar" style="width:0%"></div></div>
    <div class="feeling" id="au-feeling">充实</div>
    <div class="stat" style="margin-top:6px"><span class="stat-label">距上次交互</span><span class="stat-value" id="au-time">-</span></div>
    <div class="stat"><span class="stat-label">探索次数</span><span class="stat-value" id="au-count">0</span></div>
  </div>

  <!-- Subconscious -->
  <div class="sidebar-section">
    <h3>🌊 潜意识</h3>
    <div class="stat"><span class="stat-label">阶段</span><span class="stat-value" id="sc-phase">idle</span></div>
    <div class="stat"><span class="stat-label">本周期产出</span><span class="stat-value" id="sc-outputs">0</span></div>
    <div class="sub-agents" id="sc-agents">
      <span class="sub-chip">explorer</span>
      <span class="sub-chip">pattern</span>
      <span class="sub-chip">associator</span>
      <span class="sub-chip">dreamer</span>
    </div>
  </div>

  <!-- Memory -->
  <div class="sidebar-section" style="flex:1;border-bottom:none;overflow:hidden;display:flex;flex-direction:column">
    <h3>🧠 记忆 (<span id="mem-count">0</span>)</h3>
    <div class="stat"><span class="stat-label">工作记忆</span><span class="stat-value" id="mem-wm">0</span></div>
    <div class="stat"><span class="stat-label">长期记忆</span><span class="stat-value" id="mem-ltm">0</span></div>
    <h3 style="margin-top:10px">最近记忆</h3>
    <div class="memory-list" id="mem-list"></div>
  </div>
</div>

<!-- Main Chat -->
<div class="main">
  <div class="chat-header">
    <div class="left">
      <span class="status-dot" id="llm-dot"></span>
      <div>
        <div class="chat-title">对话</div>
        <div class="chat-subtitle" id="llm-status">离线模式</div>
      </div>
    </div>
  </div>

  <div class="chat-area" id="chat">
    <div class="sys-msg"><span>GWS 已启动</span></div>
  </div>

  <div class="typing" id="typing">
    <span>GWS 在思考</span>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="说点什么..." autocomplete="off">
    <button onclick="send()" id="send-btn">发送</button>
  </div>
</div>

<!-- Right Panel: Internal Activity -->
<div class="right-panel">
  <h3>💭 内部活动</h3>
  <div id="thoughts"></div>
  <h3>📊 系统</h3>
  <div class="stat"><span class="stat-label">运行 ticks</span><span class="stat-value" id="sys-ticks">0</span></div>
  <div class="stat"><span class="stat-label">处理输入</span><span class="stat-value" id="sys-inputs">0</span></div>
  <div class="stat"><span class="stat-label">LLM</span><span class="stat-value" id="sys-llm">-</span></div>
</div>

<script>
const API = '';
let historyLoaded = false;

// === API ===
async function api(path, opts = {}) {
  const resp = await fetch(API + path, {
    headers: {'Content-Type': 'application/json'},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  return resp.json();
}

// === Render Helpers ===
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}

function formatTime(sec) {
  if (!sec) return '-';
  if (sec < 60) return sec + '秒';
  if (sec < 3600) return Math.floor(sec/60) + '分';
  return Math.floor(sec/3600) + '时' + Math.floor((sec%3600)/60) + '分';
}

// === Chat ===
const chat = document.getElementById('chat');

function addMsg(text, role, extra) {
  const msg = el('div', 'msg ' + role);
  const bubble = el('div', 'msg-bubble', text.replace(/\n/g, '<br>'));
  msg.appendChild(bubble);
  if (extra) {
    msg.appendChild(el('div', 'msg-meta', extra));
  }
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addSubActivity(source, content) {
  const div = el('div', 'sub-activity');
  div.innerHTML = `<div class="sub-title">🌊 ${source}</div><div class="sub-content">${content.substring(0, 200)}${content.length > 200 ? '...' : ''}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addSysMsg(text) {
  const div = el('div', 'sys-msg', `<span>${text}</span>`);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// === Send ===
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  addMsg(text, 'user');
  
  const typing = document.getElementById('typing');
  typing.classList.add('show');
  document.getElementById('send-btn').disabled = true;

  try {
    const data = await api('/api/input', { method: 'POST', body: {text} });
    typing.classList.remove('show');
    document.getElementById('send-btn').disabled = false;

    const reply = data.response || '（没有回复 — 需要配置 LLM）';
    const em = data.emotion_label || '';
    addMsg(reply, 'gws', `情绪: ${em}`);
    
    refresh();
  } catch (e) {
    typing.classList.remove('show');
    document.getElementById('send-btn').disabled = false;
    addMsg('发送失败: ' + e.message, 'gws');
  }
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// === Load History ===
async function loadHistory() {
  if (historyLoaded) return;
  historyLoaded = true;
  try {
    const data = await api('/api/history');
    (data.history || []).forEach(msg => {
      if (msg.role === 'user') {
        addMsg(msg.text, 'user');
      } else {
        addMsg(msg.text, 'gws', msg.emotion ? `情绪: ${msg.emotion}` : null);
      }
    });
  } catch (e) {}
}

// === Refresh Status ===
async function refresh() {
  try {
    const d = await api('/api/status');
    
    // Connection
    document.getElementById('conn-dot').style.background = 'var(--green)';
    
    // Emotion
    const em = d.emotion || {};
    const st = em.state || {};
    document.getElementById('em-label').textContent = em.label || '-';
    setPad('v', st.valence || 0);
    setPad('a', st.arousal || 0);
    setPad('d', st.dominance || 0);
    document.getElementById('em-strategy').textContent = em.thinking_strategy || '-';

    // Autonomy
    const auto = d.autonomy || {};
    const bored = (auto.boredom || 0) * 100;
    document.getElementById('au-boredom').textContent = bored.toFixed(0) + '%';
    document.getElementById('au-bar').style.width = bored + '%';
    document.getElementById('au-feeling').textContent = auto.feeling || '-';
    document.getElementById('au-time').textContent = formatTime(auto.time_since_interaction);
    document.getElementById('au-count').textContent = auto.exploration_count || 0;

    // Subconscious
    const sub = d.subconscious || {};
    document.getElementById('sc-phase').textContent = sub.phase || '-';
    document.getElementById('sc-outputs').textContent = sub.outputs_this_cycle || 0;
    document.getElementById('sys-llm').textContent = sub.has_llm ? '✓ 已连接' : '离线';
    document.getElementById('llm-dot').style.background = sub.has_llm ? 'var(--green)' : 'var(--orange)';
    document.getElementById('llm-status').textContent = sub.has_llm ? 'LLM 已连接' : '离线模式';
    
    // Memory
    const ltm = d.long_term_memory || {};
    document.getElementById('mem-count').textContent = ltm.total || 0;
    document.getElementById('mem-wm').textContent = d.working_memory || 0;
    document.getElementById('mem-ltm').textContent = ltm.total || 0;

    // System
    document.getElementById('sys-ticks').textContent = d.uptime_ticks || 0;
    document.getElementById('sys-inputs').textContent = d.inputs_processed || 0;

  } catch (e) {
    document.getElementById('conn-dot').style.background = 'var(--red)';
  }
}

function setPad(dim, val) {
  const pct = val * 50;
  const fill = document.getElementById('bar-' + dim);
  if (val >= 0) {
    fill.style.left = '50%';
    fill.style.width = pct + '%';
  } else {
    fill.style.left = (50 + pct) + '%';
    fill.style.width = (-pct) + '%';
  }
  fill.style.background = val > 0.1 ? 'var(--green)' : val < -0.1 ? 'var(--red)' : 'var(--accent)';
  document.getElementById('val-' + dim).textContent = val.toFixed(2);
}

// === Init ===
loadHistory();
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
