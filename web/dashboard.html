<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GWS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a10;--s1:#12121a;--s2:#1a1a26;--s3:#22222e;--bdr:#2a2a3a;--t1:#e0e0e8;--t2:#7878a0;--accent:#6b8aff;--green:#4ade80;--orange:#fb923c;--red:#f87171}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);display:flex}
*{scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}

/* Layout */
.panel{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.left{width:280px;min-width:280px;background:var(--s1);border-right:1px solid var(--bdr)}
.center{flex:1;min-width:0}
.right{width:300px;min-width:300px;background:var(--s1);border-left:1px solid var(--bdr)}

/* Panel headers */
.ph{padding:10px 14px;border-bottom:1px solid var(--bdr);font-size:.7em;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);display:flex;align-items:center;gap:6px}
.ph .dot{width:6px;height:6px;border-radius:50%}
.dot.on{background:var(--green)}.dot.off{background:var(--orange)}.dot.err{background:var(--red)}
.ph-title{flex:1}

/* Section */
.sec{padding:10px 14px;border-bottom:1px solid var(--bdr)}
.sec-title{font-size:.65em;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:8px}

/* Emotion */
.em-label{font-size:1.3em;font-weight:700;text-align:center;margin-bottom:6px}
.pad{display:flex;align-items:center;margin:3px 0;font-size:.78em}
.pad-l{width:24px;color:var(--t2);font-size:.9em}
.pad-bar{flex:1;height:5px;background:var(--bdr);border-radius:3px;position:relative;margin:0 6px}
.pad-f{position:absolute;height:100%;border-radius:3px;transition:all .5s}
.pad-v{width:36px;text-align:right;color:var(--t2);font-size:.85em}

/* Boredom */
.bored-track{width:100%;height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;margin:4px 0}
.bored-f{height:100%;background:linear-gradient(90deg,var(--green),var(--orange),var(--red));transition:width .5s;border-radius:4px}
.feeling{font-size:.75em;color:var(--t2);font-style:italic}

/* Stats */
.st{display:flex;justify-content:space-between;font-size:.75em;padding:2px 0}
.st-l{color:var(--t2)}.st-v{color:var(--t1);font-weight:500}

/* Agent chips */
.chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{padding:2px 7px;background:var(--s2);border-radius:8px;font-size:.7em;color:var(--t2);border:1px solid var(--bdr)}
.chip.active{border-color:var(--accent);color:var(--accent)}

/* Memory */
.mem-list{max-height:150px;overflow-y:auto}
.mem-item{padding:4px 6px;margin:2px 0;background:var(--s2);border-radius:4px;border-left:2px solid var(--accent);font-size:.72em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* === Center: Chat === */
.chat-header{padding:10px 16px;border-bottom:1px solid var(--bdr);background:var(--s1);display:flex;align-items:center;gap:8px}
.chat-header .name{font-weight:600}
.chat-header .sub{font-size:.75em;color:var(--t2)}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px}

.msg{max-width:80%;padding:8px 12px;border-radius:10px;font-size:.88em;line-height:1.5}
.msg.u{align-self:flex-end;background:#1a2a1e;border:1px solid #2a3a2e;border-bottom-right-radius:3px}
.msg.g{align-self:flex-start;background:var(--s2);border:1px solid var(--bdr);border-bottom-left-radius:3px}
.msg-meta{font-size:.7em;color:var(--t2);margin-top:3px}
.sys{text-align:center;font-size:.72em;color:var(--t2);margin:4px 0}
.sys span{background:var(--s2);padding:3px 10px;border-radius:8px}

/* Subconscious / Consciousness cards in chat */
.sc-card{max-width:85%;align-self:flex-start;background:var(--s2);border:1px solid var(--bdr);border-left:3px solid var(--accent);border-radius:8px;padding:8px 12px;font-size:.8em}
.sc-card .sc-tag{font-size:.7em;color:var(--accent);margin-bottom:2px;font-weight:600}
.sc-card .sc-body{color:var(--t2);line-height:1.4}
.cn-card{max-width:85%;align-self:flex-start;background:var(--s2);border:1px solid var(--bdr);border-left:3px solid var(--orange);border-radius:8px;padding:8px 12px;font-size:.8em}
.cn-card .cn-tag{font-size:.7em;color:var(--orange);margin-bottom:2px;font-weight:600}
.cn-card .cn-body{line-height:1.4}

.typing{display:none;padding:6px 12px;align-self:flex-start}
.typing.show{display:flex;align-items:center;gap:4px}
.typing span{font-size:.75em;color:var(--t2)}
.tdot{width:5px;height:5px;background:var(--t2);border-radius:50%;animation:tb 1.4s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

.input-bar{padding:10px 16px;border-top:1px solid var(--bdr);background:var(--s1);display:flex;gap:8px}
.input-bar input{flex:1;padding:8px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;color:var(--t1);font-size:.88em;outline:none}
.input-bar input:focus{border-color:var(--accent)}
.input-bar button{padding:8px 16px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer}

/* === Right: Streams === */
.stream{flex:1;overflow-y:auto;padding:8px}
.stream-item{padding:6px 8px;margin:4px 0;background:var(--s2);border-radius:6px;font-size:.75em;line-height:1.4}
.stream-item .si-tag{font-size:.85em;color:var(--accent);font-weight:600}
.stream-item .si-time{color:var(--t2);font-size:.85em;float:right}
.stream-item .si-body{color:var(--t2);margin-top:2px}
.stream-item.conscious{border-left:2px solid var(--orange)}
.stream-item.conscious .si-tag{color:var(--orange)}
.stream-item.summary{border-left:2px solid var(--green)}
.stream-item.summary .si-tag{color:var(--green)}

.daemon-bar{padding:8px 14px;border-bottom:1px solid var(--bdr);font-size:.75em}
.daemon-bar .db-row{display:flex;justify-content:space-between;padding:2px 0}

@media(max-width:1100px){.right{display:none}}
@media(max-width:768px){.left{display:none}}
</style>
</head>
<body>

<!-- LEFT: Status Panel -->
<div class="left panel">
  <div class="ph"><span class="dot on" id="conn-dot"></span><span class="ph-title">🌳 GWS 状态</span></div>

  <div class="sec">
    <div class="sec-title">🎭 情绪</div>
    <div class="em-label" id="em-label">中性</div>
    <div class="pad"><span class="pad-l">V</span><div class="pad-bar"><div class="pad-f" id="pf-v"></div></div><span class="pad-v" id="pv-v">0</span></div>
    <div class="pad"><span class="pad-l">A</span><div class="pad-bar"><div class="pad-f" id="pf-a"></div></div><span class="pad-v" id="pv-a">0</span></div>
    <div class="pad"><span class="pad-l">D</span><div class="pad-bar"><div class="pad-f" id="pf-d"></div></div><span class="pad-v" id="pv-d">0</span></div>
    <div class="st" style="margin-top:4px"><span class="st-l">策略</span><span class="st-v" id="em-strat">neutral</span></div>
  </div>

  <div class="sec">
    <div class="sec-title">🤖 自主</div>
    <div class="st"><span class="st-l">无聊感</span><span class="st-v" id="au-b">0%</span></div>
    <div class="bored-track"><div class="bored-f" id="au-bar"></div></div>
    <div class="feeling" id="au-feel">充实</div>
    <div class="st"><span class="st-l">探索</span><span class="st-v" id="au-exp">0次</span></div>
  </div>

  <div class="sec">
    <div class="sec-title">🌊 潜意识</div>
    <div class="st"><span class="st-l">阶段</span><span class="st-v" id="sc-ph">idle</span></div>
    <div class="st"><span class="st-l">产出</span><span class="st-v" id="sc-out">0</span></div>
    <div class="chips" id="sc-chips">
      <span class="chip">explorer</span><span class="chip">pattern</span><span class="chip">associator</span><span class="chip">dreamer</span>
    </div>
  </div>

  <div class="sec" style="flex:1;border-bottom:none;display:flex;flex-direction:column;overflow:hidden">
    <div class="sec-title">🧠 记忆 (<span id="mem-n">0</span>)</div>
    <div class="st"><span class="st-l">工作</span><span class="st-v" id="mem-wm">0</span></div>
    <div class="st"><span class="st-l">长期</span><span class="st-v" id="mem-ltm">0</span></div>
    <div class="sec-title" style="margin-top:8px">最近记忆</div>
    <div class="mem-list" id="mem-list"></div>
  </div>
</div>

<!-- CENTER: Chat -->
<div class="center panel">
  <div class="chat-header">
    <div>
      <div class="name">对话</div>
      <div class="sub" id="llm-label">离线模式</div>
    </div>
  </div>
  <div class="chat-body" id="chat"></div>
  <div class="typing" id="typing"><span>思考中</span><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>
  <div class="input-bar">
    <input type="text" id="inp" placeholder="说点什么..." autocomplete="off">
    <button onclick="send()" id="sbtn">发送</button>
  </div>
</div>

<!-- RIGHT: Streams -->
<div class="right panel">
  <div class="ph"><span class="dot off" id="daemon-dot"></span><span class="ph-title">📡 实时流</span></div>
  <div class="daemon-bar" id="daemon-bar">
    <div class="db-row"><span class="st-l">守护进程</span><span class="st-v" id="dm-state">未运行</span></div>
    <div class="db-row"><span class="st-l">周期</span><span class="st-v" id="dm-cycle">-</span></div>
  </div>
  <div class="stream" id="stream"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const chat = $('chat'), stream = $('stream');
let histLoaded = false;

async function api(path, opts={}) {
  const r = await fetch(path, {headers:{'Content-Type':'application/json'},...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  return r.json();
}

function fmt(t){if(!t)return'-';if(t<60)return t+'s';if(t<3600)return Math.floor(t/60)+'m';return Math.floor(t/3600)+'h'}

function scroll(el){el.scrollTop=el.scrollHeight}

// === Chat ===
function addMsg(text, role, meta) {
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'u' : 'g');
  d.innerHTML = text.replace(/\n/g,'<br>') + (meta ? `<div class="msg-meta">${meta}</div>` : '');
  chat.appendChild(d);
  scroll(chat);
}

function addSys(text) {
  const d = document.createElement('div');
  d.className = 'sys';
  d.innerHTML = `<span>${text}</span>`;
  chat.appendChild(d);
  scroll(chat);
}

function addScCard(tag, body) {
  const d = document.createElement('div');
  d.className = 'sc-card';
  d.innerHTML = `<div class="sc-tag">🌊 ${tag}</div><div class="sc-body">${body.substring(0,200)}</div>`;
  chat.appendChild(d);
  scroll(chat);
}

function addCnCard(body) {
  const d = document.createElement('div');
  d.className = 'cn-card';
  d.innerHTML = `<div class="cn-tag">💭 意识</div><div class="cn-body">${body.substring(0,200)}</div>`;
  chat.appendChild(d);
  scroll(chat);
}

async function send() {
  const inp = $('inp'), text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  addMsg(text, 'user');
  $('typing').classList.add('show');
  $('sbtn').disabled = true;
  
  try {
    // 1. 发送输入，立即返回 task_id
    const d = await api('/api/input', {method:'POST',body:{text}});
    const taskId = d.task_id;
    if(!taskId) throw new Error('No task_id');
    
    // 2. 轮询等待结果
    let result = null;
    for(let i = 0; i < 60; i++) { // 最多等2分钟
      await sleep(2000);
      const task = await api('/api/task?id=' + taskId);
      if(task.status === 'done') { result = task; break; }
      if(task.status === 'error') { throw new Error(task.error); }
    }
    
    $('typing').classList.remove('show');
    $('sbtn').disabled = false;
    
    if(result) {
      addMsg(result.response||'（无回复）', 'gws', `情绪: ${result.emotion||'?'}`);
      (result.subconscious||[]).forEach(s => addScCard(s.role, s.content));
      (result.consciousness||[]).forEach(c => addCnCard(c));
      refresh();
    } else {
      addMsg('回复超时', 'gws');
    }
  } catch(e) {
    $('typing').classList.remove('show');
    $('sbtn').disabled = false;
    addMsg('错误: '+e.message, 'gws');
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

$('inp').addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} });

// === Status Refresh ===
async function refresh() {
  try {
    const d = await api('/api/status');
    $('conn-dot').className = 'dot on';
    const em=d.emotion||{}, st=em.state||{};
    $('em-label').textContent = em.label||'-';
    setPad('v',st.valence||0); setPad('a',st.arousal||0); setPad('d',st.dominance||0);
    $('em-strat').textContent = em.thinking_strategy||'-';
    const au=d.autonomy||{}, b=(au.boredom||0)*100;
    $('au-b').textContent = b.toFixed(0)+'%';
    $('au-bar').style.width = b+'%';
    $('au-feel').textContent = au.feeling||'-';
    $('au-exp').textContent = (au.exploration_count||0)+'次';
    const sub=d.subconscious||{};
    $('sc-ph').textContent = sub.phase||'-';
    $('sc-out').textContent = sub.outputs_this_cycle||0;
    $('llm-label').textContent = sub.has_llm?'LLM 已连接':'离线模式';
    $('mem-n').textContent = (d.long_term_memory||{}).total||0;
    $('mem-wm').textContent = d.working_memory||0;
    $('mem-ltm').textContent = (d.long_term_memory||{}).total||0;
  } catch(e) { $('conn-dot').className = 'dot err'; }
}

function setPad(dim,v) {
  const pct=v*50, f=$('pf-'+dim);
  if(v>=0){f.style.left='50%';f.style.width=pct+'%'}else{f.style.left=(50+pct)+'%';f.style.width=(-pct)+'%'}
  f.style.background = v>0.1?'var(--green)':v<-0.1?'var(--red)':'var(--accent)';
  $('pv-'+dim).textContent = v.toFixed(2);
}

// === Streams ===
let lastScCount=0, lastCnCount=0;

async function refreshStreams() {
  // Subconscious stream
  try {
    const sc = await api('/api/subconscious');
    const entries = sc.entries||[];
    if(entries.length > lastScCount) {
      for(let i=lastScCount; i<entries.length; i++) {
        const e = entries[i];
        if(e.type==='cycle_summary') {
          addStreamItem('summary', `周期: ${e.subconscious_outputs||0}潜意识 ${e.conscious_outputs||0}意识 ${e.emotion||''}`, '', e.timestamp);
        } else if(e.role) {
          addStreamItem('sc', e.role, e.content, e.time);
        }
      }
      lastScCount = entries.length;
    }
  } catch(e){}

  // Consciousness stream
  try {
    const cn = await api('/api/consciousness');
    const entries = cn.entries||[];
    if(entries.length > lastCnCount) {
      for(let i=lastCnCount; i<entries.length; i++) {
        const e = entries[i];
        addStreamItem('cn', e.agent_role||'conscious', e.content, e.time);
      }
      lastCnCount = entries.length;
    }
  } catch(e){}

  // Daemon status
  try {
    const dm = await api('/api/daemon');
    $('dm-state').textContent = dm.state||'未运行';
    $('dm-cycle').textContent = dm.cycle_seconds ? dm.cycle_seconds+'s' : '-';
    $('daemon-dot').className = 'dot ' + (dm.state==='running'?'on':'off');
  } catch(e){}
}

function addStreamItem(type, tag, body, time) {
  const d = document.createElement('div');
  d.className = 'stream-item ' + (type==='cn'?'conscious':type==='summary'?'summary':'');
  const ts = time ? new Date(typeof time==='number'?time*1000:time).toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
  d.innerHTML = `<span class="si-time">${ts}</span><div class="si-tag">${tag}</div><div class="si-body">${(body||'').substring(0,150)}</div>`;
  stream.appendChild(d);
  scroll(stream);
  // Keep stream manageable
  while(stream.children.length > 100) stream.removeChild(stream.firstChild);
}

// === Load History ===
async function loadHistory() {
  if(histLoaded) return; histLoaded=true;
  try {
    const d = await api('/api/history');
    (d.history||[]).forEach(m => {
      if(m.role==='user') addMsg(m.text,'user');
      else addMsg(m.text,'gws',m.emotion?`情绪:${m.emotion}`:null);
    });
  } catch(e){}
}

// === Memory ===
async function refreshMemory() {
  try {
    const d = await api('/api/memory');
    const list = $('mem-list');
    list.innerHTML = '';
    (d.long_term_memory||[]).slice(0,15).forEach(m => {
      const div = document.createElement('div');
      div.className = 'mem-item';
      div.innerHTML = `<span class="mem-type">[${m.type}]</span> ${m.content}`;
      div.title = m.content;
      list.appendChild(div);
    });
  } catch(e){}
}

// === Init ===
loadHistory();
refresh();
refreshMemory();
refreshStreams();
setInterval(refresh, 5000);
setInterval(refreshStreams, 3000);
setInterval(refreshMemory, 30000);
</script>
</body>
</html>
