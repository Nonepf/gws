<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GWS v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--s1:#0f0f1a;--s2:#161625;--bdr:#252540;--t1:#e0e0f0;--t2:#6868a0;--accent:#6b8aff;--green:#4ade80}
html,body{height:100%;font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1)}
.app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto}

/* Header */
.header{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0}
.header .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}.dot.off{background:#555}
.header .name{font-weight:600;font-size:1em}
.header .sub{font-size:.75em;color:var(--t2);margin-left:auto;display:flex;align-items:center;gap:12px}
.header a{color:var(--accent);text-decoration:none;font-size:.85em}
.header a:hover{text-decoration:underline}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:.92em;line-height:1.6}
.msg.u{align-self:flex-end;background:#1a2a1e;border:1px solid #2a3a2e;border-bottom-right-radius:4px}
.msg.g{align-self:flex-start;background:var(--s2);border:1px solid var(--bdr);border-bottom-left-radius:4px}
.msg .meta{font-size:.72em;color:var(--t2);margin-top:4px}
.sys{text-align:center;font-size:.72em;color:var(--t3);margin:4px 0}
.sys span{background:var(--s2);padding:2px 10px;border-radius:8px}

/* Typing */
.typing{display:none;padding:6px 12px;align-self:flex-start;align-items:center;gap:4px}
.typing.show{display:flex}
.typing span{font-size:.75em;color:var(--t2)}
.dot-t{width:5px;height:5px;background:var(--t2);border-radius:50%;animation:tb 1.4s infinite}
.dot-t:nth-child(2){animation-delay:.2s}.dot-t:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Input */
.input-bar{padding:12px 16px;border-top:1px solid var(--bdr);background:var(--s1);display:flex;gap:8px;flex-shrink:0}
.input-bar input{flex:1;padding:10px 14px;background:var(--s2);border:1px solid var(--bdr);border-radius:10px;color:var(--t1);font-size:.92em;outline:none;transition:border .2s}
.input-bar input:focus{border-color:var(--accent)}
.input-bar button{padding:10px 20px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer;transition:background .2s}
.input-bar button:hover{background:#8aa4ff}
.input-bar button:disabled{opacity:.5;cursor:wait}

@media(max-width:600px){.app{max-width:100%}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="dot off" id="conn-dot"></span>
    <span class="name">🌳 GWS v3</span>
    <div class="sub">
      <span id="emotion-badge">中性</span>
      <a href="/dashboard.html" target="_blank">📊 仪表板</a>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="typing" id="typing"><span>思考中</span><div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div></div>
  <div class="input-bar">
    <input type="text" id="inp" placeholder="说点什么..." autocomplete="off">
    <button onclick="send()" id="sbtn">发送</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const chat = $('chat');

// === API ===
async function api(path, opts={}) {
  const r = await fetch(path, {headers:{'Content-Type':'application/json'},...opts,
    body:opts.body?JSON.stringify(opts.body):undefined});
  return r.json();
}

// === Chat ===
function addMsg(text, role, meta) {
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'u' : 'g');
  d.innerHTML = text.replace(/\n/g,'<br>') + (meta ? `<div class="meta">🎭 ${meta}</div>` : '');
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function addSys(text) {
  const d = document.createElement('div');
  d.className = 'sys';
  d.innerHTML = `<span>${text}</span>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const inp = $('inp'), text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  addMsg(text, 'user');
  $('typing').classList.add('show');
  $('sbtn').disabled = true;

  try {
    const d = await api('/api/input', {method:'POST', body:{text}});
    const taskId = d.task_id;
    if(!taskId) throw new Error('No task_id');

    let result = null;
    for(let i = 0; i < 60; i++) {
      await sleep(2000);
      const task = await api('/api/task?id=' + taskId);
      if(task.status === 'done') { result = task; break; }
      if(task.status === 'error') { throw new Error(task.error); }
    }

    $('typing').classList.remove('show');
    $('sbtn').disabled = false;

    if(result) {
      addMsg(result.response || '（无回复）', 'gws', result.emotion);
    } else {
      addMsg('回复超时', 'gws');
    }
  } catch(e) {
    $('typing').classList.remove('show');
    $('sbtn').disabled = false;
    addMsg('错误: ' + e.message, 'gws');
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
$('inp').addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} });

// === Status polling (minimal) ===
async function pollStatus() {
  try {
    const d = await api('/api/status');
    $('conn-dot').className = 'dot on';
    $('emotion-badge').textContent = d.emotion?.label || '-';
  } catch(e) {
    $('conn-dot').className = 'dot off';
  }
}
setInterval(pollStatus, 5000);
pollStatus();

// === Load history ===
async function loadHistory() {
  try {
    const d = await api('/api/history');
    (d.history||[]).forEach(m => {
      if(m.role==='user') addMsg(m.text, 'user');
      else addMsg(m.text, 'gws', m.emotion||null);
    });
  } catch(e) {}
}
loadHistory();
</script>
</body>
</html>
